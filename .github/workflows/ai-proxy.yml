name: AI Proxy

on:
  workflow_dispatch:

permissions:
  contents: write
  models: read

env:
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ai-proxy-loop
  cancel-in-progress: false

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: python -m pip install requests cryptography -q

      - name: Run AI proxy loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHAT_QUEUE_KEY: ${{ secrets.CHAT_QUEUE_KEY }}

          # Optional provider keys. Add only the ones you want to use.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PUTER_TOKEN: ${{ secrets.PUTER_TOKEN }}
        run: python proxy.py
