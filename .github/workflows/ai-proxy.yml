name: AI Proxy

on:
  workflow_dispatch:
  # (اختیاری) اگر می‌خواهید پراکسی ۲۴ ساعته روشن بماند، این بخش را از کامنت خارج کنید
  # schedule:
  #   - cron: "0 */5 * * *" # اجرای خودکار هر ۵ ساعت یک‌بار برای جلوگیری از خاموش شدن بات

permissions:
  contents: write
  models: read
  issues: write         # اضافه شده: برای اینکه بات بتواند روی ایشوها کامنت بگذارد یا بخواند
  pull-requests: write  # اضافه شده: برای کار بات با پول‌ریکوست‌ها

env:
  PYTHONUNBUFFERED: "1"

concurrency:
  group: ai-proxy-loop
  cancel-in-progress: false

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # اضافه شده: نصب و تنظیم درست پایتون برای جلوگیری از خطای pip در Ubuntu-latest
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # می‌توانید نسخه دلخواه پایتون خود را قرار دهید

      - name: Install dependencies
        run: python -m pip install requests cryptography -q

      - name: Run AI proxy loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHAT_QUEUE_KEY: ${{ secrets.CHAT_QUEUE_KEY }}

          # Optional provider keys. Add only the ones you want to use.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          PUTER_TOKEN: ${{ secrets.PUTER_TOKEN }}
        run: python proxy.py
